  <div
    class="modal fade"
    id="fleet-req-template-modal"
    tabindex="-1"
    aria-labelledby="fleet-req-template-modal-label"
    aria-hidden="true"
  >
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="fleet-req-template-modal-label">Requirement template</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body small">
          <div class="mb-2">
            <label class="form-label small mb-0" for="fleet-req-field-id">id (slug)</label>
            <input class="form-control form-control-sm fleet-mono" id="fleet-req-field-id" autocomplete="off" />
          </div>
          <div class="mb-2">
            <label class="form-label small mb-0" for="fleet-req-field-title">title</label>
            <input class="form-control form-control-sm" id="fleet-req-field-title" autocomplete="off" />
          </div>
          <div class="mb-2">
            <label class="form-label small mb-0" for="fleet-req-field-kind">kind</label>
            <select class="form-select form-select-sm fleet-mono" id="fleet-req-field-kind">
              <option value="dockerfile">dockerfile</option>
              <option value="image">image</option>
            </select>
          </div>
          <div class="mb-2">
            <label class="form-label small mb-0" for="fleet-req-field-ref">ref (path under <code class="fleet-mono">etc/containers/</code> or <code class="fleet-mono">image:tag</code>)</label>
            <input class="form-control form-control-sm fleet-mono" id="fleet-req-field-ref" autocomplete="off" />
          </div>
          <div class="mb-2">
            <label class="form-label small mb-0" for="fleet-req-field-notes">notes</label>
            <textarea class="form-control form-control-sm" id="fleet-req-field-notes" rows="2"></textarea>
          </div>
          <p class="text-danger small mb-0 d-none" id="fleet-req-edit-err"></p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-sm btn-primary" id="fleet-req-edit-save">Save row</button>
        </div>
      </div>
    </div>
  </div>
