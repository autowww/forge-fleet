<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fleet — status</title>
  <script>
  (function () {
    try {
      if (!document.cookie.match(/(?:^|;)\s*forge_color_scheme=/)) {
        document.cookie = "forge_color_scheme=auto; Path=/; Max-Age=31536000; SameSite=Lax";
      }
      var m = document.cookie.match(/(?:^|;)\s*forge_color_scheme=([^;]*)/);
      var v = m ? decodeURIComponent(m[1].trim()) : "";
      var mq = window.matchMedia("(prefers-color-scheme: dark)");
      var t = "dark";
      if (v === "light") t = "light";
      else if (v === "dark") t = "dark";
      else if (v === "auto") t = mq.matches ? "dark" : "light";
      document.documentElement.setAttribute("data-bs-theme", t);
    } catch (_e) { /* ignore */ }
  })();
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="/admin/ks/css/forge-theme.css" />
  <link rel="stylesheet" href="/admin/ks/css/forge-fleet-admin.css" />
  <link rel="stylesheet" href="/admin/static/tile-row-fallback.css" />
</head>
