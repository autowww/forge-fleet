# Forge SDLC — project configuration
# Generated by forge-init.sh or the setup wizard.
# Edit to match your team's needs.

project:
  name: "Forge Fleet"
  # Product stage: poc | mvp | growth | mature
  stage: mvp

team:
  # Scaling tier: solo | small | team | multi-team
  scale: team
  # Iteration length in weeks
  iteration_weeks: 1
  # Ceremony weight: light | standard | formal
  ceremony_weight: standard

hats:
  product:
    owner: ""
    # dedicated: true if a specific person holds this hat
    dedicated: false
  engineering:
    owner: ""
    dedicated: false
  challenge:
    owner: ""
    dedicated: false
  governance:
    owner: ""
    dedicated: false

versona:
  # Active discipline families
  families:
    engineering: true
    data: false
    product: true
    governance: true
  # Cross-cutting (always recommended)
  cross_cutting:
    security: true
    compliance: true
  # Product sub-disciplines (when product family is active)
  product_disciplines:
    product_management: true
    business_analysis: true
    ux_design: true
    marketing: true
    customer_success: true
  # Engineering sub-disciplines (when engineering family is active)
  engineering_disciplines:
    software_engineering: true
    software_architecture: true
    devops: true
    testing: true
    frontend: false
    mobile: false
    embedded_iot: false

assay_gate:
  # Evidence types required for release
  core:
    - tests_pass
    - acceptance_criteria_met
    - risks_reviewed
  # Additional per work type (configure as needed)
  feature: []
  bugfix: []
  infrastructure: []

paths:
  charge: forge/charge.md
  ember_logs: ember-logs/
  journal: forge/journal/
  releases: forge/releases/
